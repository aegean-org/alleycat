name: iroh-relay image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/iroh-relay-image.yml"
      - "deploy/iroh-relay/**"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/aegean-org/iroh-relay

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: deploy/iroh-relay
          file: deploy/iroh-relay/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:0.98.0
            ${{ env.IMAGE_NAME }}:latest
